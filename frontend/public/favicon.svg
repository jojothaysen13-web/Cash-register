  <!-- Text "S" -->
  <text x="32" y="95" font-size="72" font-weight="bold" fill="#DC143C" font-family="Arial, sans-serif" text-anchor="middle">S</text>

  <!-- Text "T" -->
  <text x="96" y="95" font-size="72" font-weight="bold" fill="#DC143C" font-family="Arial, sans-serif" text-anchor="middle">T</text>

  <!-- Border -->
