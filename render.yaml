# Render.com Blueprint – kostenloses 1-Klick-Deployment.
# Baut per Dockerfile: ein Container, eine oeffentliche URL fuer Kasse + Admin + API.
#
# Deployen: https://dashboard.render.com -> "New" -> "Blueprint" -> dieses Repo waehlen -> "Apply".
services:
  - type: web
    name: cash-register
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Sicheres JWT-Secret automatisch generieren.
      - key: JWT_SECRET
        generateValue: true
      # Optional: echtes Stripe aktivieren, sonst laeuft der Test-/Mock-Modus.
      - key: STRIPE_SECRET_KEY
        sync: false
